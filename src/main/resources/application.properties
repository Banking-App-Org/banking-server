server.port=8082
server.servlet.context-path=/api
server.error.include-message=always

# Database Configuration - PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/banking_server_db
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.default_schema=banking_server

# Flyway Configuration
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration_banking_server
spring.flyway.schemas=banking_server

# Kafka Configuration
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

# Logging Configuration
logging.level.root=INFO
logging.level.com.banking.bankingserver=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %logger{36} - %msg%n
logging.file.name=logs/banking-server.log

# JWT Configuration
jwt.secret=your-secret-key-change-in-production-min-32-chars!
jwt.expiration=86400000

# Notifications Service
notifications.service.url=http://localhost:8099/notifications-service

# Application Info
spring.application.name=banking-server
info.app.name=Banking Server
info.app.description=Banking Portal Server - User Accounts, Transactions, and Payments
info.app.version=1.0.0

# Actuator Configuration
management.endpoints.web.exposure.include=health,metrics,prometheus,info,env
management.endpoint.health.show-details=always
management.metrics.export.prometheus.enabled=true
